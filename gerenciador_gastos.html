<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Gastos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --green-light: #E1F5EEdd; --green-dark: #085041;
      --red: #D85A30; --red-light: #FAECE7dd; --red-dark: #4A1B0C;
      --blue: #378ADD; --blue-light: #E6F1FB;
      --amber: #BA7517; --amber-light: #FAEEDA;
      --bg: #f9f9f7;
      --bg2: #f1efe8;
      --bg3: #ffffff;
      --text: #1a1a18;
      --text2: #6b6a65;
      --text3: #a0a09a;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --bg2: #252522; --bg3: #2c2c2a;
        --text: #f0ede6; --text2: #a0a09a; --text3: #6b6a65;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
        --green-light: #04342C99; --red-light: #4A1B0C99;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 680px; margin: 0 auto; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
    .top-bar h1 { font-size: 20px; font-weight: 600; }
    .date-nav { display: flex; align-items: center; gap: 8px; }
    .date-nav button {
      background: var(--bg3); border: 0.5px solid var(--border2);
      border-radius: var(--radius-md); padding: 5px 12px; cursor: pointer;
      font-size: 14px; color: var(--text2);
    }
    .date-nav button:hover { background: var(--bg2); }
    .date-nav span { font-size: 14px; font-weight: 500; color: var(--text); min-width: 120px; text-align: center; }

    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .card { background: var(--bg2); border-radius: var(--radius-md); padding: 1rem; }
    .card .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .card .value { font-size: 20px; font-weight: 600; }
    .card.income .value { color: var(--green); }
    .card.expense .value { color: var(--red); }

    .section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; text-transform: lowercase; letter-spacing: .02em; }

    .add-form {
      background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem;
    }
    .type-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 12px; }
    .type-toggle button { flex: 1; border: none; padding: 8px; font-size: 14px; cursor: pointer; background: var(--bg2); color: var(--text2); transition: background .15s; }
    .type-toggle button.active-income { background: var(--green-light); color: var(--green-dark); font-weight: 600; }
    .type-toggle button.active-expense { background: var(--red-light); color: var(--red-dark); font-weight: 600; }

    .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr 1fr; } .form-grid .desc-field { grid-column: 1 / -1; } }
    .field-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 8px 10px; font-size: 14px;
      border: 0.5px solid var(--border2); border-radius: var(--radius-md);
      background: var(--bg); color: var(--text); outline: none;
    }
    input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(55,138,221,.15); }
    .btn-add {
      background: var(--green); color: #fff; border: none;
      border-radius: var(--radius-md); padding: 9px 22px;
      font-size: 14px; cursor: pointer; font-weight: 600;
    }
    .btn-add:hover { opacity: 0.88; }

    .list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
    .entry {
      background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: .75rem 1rem;
      display: flex; align-items: center; gap: 12px;
    }
    .entry-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .entry-icon.income { background: var(--green-light); }
    .entry-icon.expense { background: var(--red-light); }
    .entry-info { flex: 1; min-width: 0; }
    .entry-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-meta { font-size: 12px; color: var(--text2); }
    .entry-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
    .entry-amount.income { color: var(--green); }
    .entry-amount.expense { color: var(--red); }
    .entry-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .entry-del:hover { background: var(--red-light); color: var(--red); }

    .empty { text-align: center; padding: 2rem; font-size: 14px; color: var(--text2); border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); }

    .chart-wrap { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
    .cat-bars { display: flex; flex-direction: column; gap: 12px; }
    .cat-row { display: flex; align-items: center; gap: 10px; }
    .cat-name { font-size: 13px; color: var(--text2); width: 100px; flex-shrink: 0; }
    .cat-bar-bg { flex: 1; height: 8px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .cat-bar-fill { height: 100%; border-radius: 99px; background: var(--red); transition: width .4s; }
    .cat-val { font-size: 12px; font-weight: 600; color: var(--text); width: 80px; text-align: right; flex-shrink: 0; }

    footer { text-align: center; margin-top: 2.5rem; font-size: 12px; color: var(--text3); }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <h1>💰 meus gastos</h1>
    <div class="date-nav">
      <button id="prev-day">‹</button>
      <span id="date-label"></span>
      <button id="next-day">›</button>
    </div>
  </div>

  <div class="cards">
    <div class="card income"><div class="label">entradas</div><div class="value" id="total-income">R$ 0,00</div></div>
    <div class="card expense"><div class="label">saídas</div><div class="value" id="total-expense">R$ 0,00</div></div>
    <div class="card balance"><div class="label">saldo do dia</div><div class="value" id="total-balance">R$ 0,00</div></div>
  </div>

  <div class="add-form">
    <p class="section-title" style="margin-bottom:10px;">adicionar transação</p>
    <div class="type-toggle">
      <button id="btn-income" class="active-income" onclick="setType('income')">+ entrada</button>
      <button id="btn-expense" onclick="setType('expense')">− saída</button>
    </div>
    <div class="form-grid">
      <div class="desc-field">
        <label class="field-label">descrição</label>
        <input type="text" id="inp-desc" placeholder="ex: almoço, salário…" />
      </div>
      <div>
        <label class="field-label">valor (R$)</label>
        <input type="number" id="inp-val" placeholder="0,00" min="0" step="0.01" />
      </div>
      <div>
        <label class="field-label">categoria</label>
        <select id="inp-cat">
          <option>Alimentação</option>
          <option>Transporte</option>
          <option>Saúde</option>
          <option>Lazer</option>
          <option>Moradia</option>
          <option>Salário</option>
          <option>Freelance</option>
          <option>Outros</option>
        </select>
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">adicionar</button>
  </div>

  <p class="section-title">transações do dia</p>
  <div class="list" id="entry-list"></div>

  <div class="chart-wrap">
    <p class="section-title" style="margin-bottom:1rem;">gastos por categoria</p>
    <div class="cat-bars" id="cat-chart"></div>
  </div>

  <footer>dados salvos no seu navegador · atualize à vontade</footer>
</div>

<script>
  const CAT_ICONS = {
    Alimentação:'🍽', Transporte:'🚌', Saúde:'💊', Lazer:'🎮',
    Moradia:'🏠', Salário:'💼', Freelance:'💻', Outros:'📦'
  };
  let currentType = 'income';
  let currentDate = todayStr();
  let data = {};

  function todayStr() {
    return new Date().toISOString().slice(0,10);
  }
  function fmtDate(str) {
    const [y,m,d] = str.split('-');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${d} ${months[+m-1]} ${y}`;
  }
  function fmtBRL(n) {
    return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function load() {
    try { data = JSON.parse(localStorage.getItem('gastos_data') || '{}'); } catch(e){ data={}; }
  }
  function save() {
    localStorage.setItem('gastos_data', JSON.stringify(data));
  }
  function dayData() {
    if (!data[currentDate]) data[currentDate] = [];
    return data[currentDate];
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-income').className = t==='income' ? 'active-income' : '';
    document.getElementById('btn-expense').className = t==='expense' ? 'active-expense' : '';
  }

  function addEntry() {
    const desc = document.getElementById('inp-desc').value.trim();
    const val = parseFloat(document.getElementById('inp-val').value);
    const cat = document.getElementById('inp-cat').value;
    if (!desc || isNaN(val) || val <= 0) {
      document.getElementById('inp-desc').focus();
      return;
    }
    dayData().push({ id: Date.now(), type: currentType, desc, val, cat });
    save();
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-val').value = '';
    render();
  }

  function deleteEntry(id) {
    data[currentDate] = (data[currentDate]||[]).filter(e => e.id !== id);
    save(); render();
  }

  function render() {
    document.getElementById('date-label').textContent = fmtDate(currentDate);
    const entries = dayData();
    let income = 0, expense = 0;
    entries.forEach(e => { if(e.type==='income') income+=e.val; else expense+=e.val; });
    document.getElementById('total-income').textContent = fmtBRL(income);
    document.getElementById('total-expense').textContent = fmtBRL(expense);
    const bal = income - expense;
    const balEl = document.getElementById('total-balance');
    balEl.textContent = fmtBRL(bal);
    balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';

    const list = document.getElementById('entry-list');
    if (!entries.length) {
      list.innerHTML = '<div class="empty">nenhuma transação neste dia<br><small>adicione uma acima</small></div>';
    } else {
      list.innerHTML = entries.slice().reverse().map(e => `
        <div class="entry">
          <div class="entry-icon ${e.type}">${CAT_ICONS[e.cat]||'📦'}</div>
          <div class="entry-info">
            <div class="entry-desc">${e.desc}</div>
            <div class="entry-meta">${e.cat}</div>
          </div>
          <div class="entry-amount ${e.type}">${e.type==='income'?'+':'−'}${fmtBRL(e.val)}</div>
          <button class="entry-del" onclick="deleteEntry(${e.id})" title="remover">×</button>
        </div>`).join('');
    }

    const catTotals = {};
    entries.filter(e=>e.type==='expense').forEach(e => { catTotals[e.cat]=(catTotals[e.cat]||0)+e.val; });
    const maxVal = Math.max(...Object.values(catTotals), 1);
    const chart = document.getElementById('cat-chart');
    const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    if (!sorted.length) {
      chart.innerHTML = '<p style="font-size:13px;color:var(--text2);padding:.5rem 0">sem saídas registradas hoje</p>';
    } else {
      chart.innerHTML = sorted.map(([cat,val]) => `
        <div class="cat-row">
          <div class="cat-name">${CAT_ICONS[cat]||'📦'} ${cat}</div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${Math.round(val/maxVal*100)}%"></div></div>
          <div class="cat-val">${fmtBRL(val)}</div>
        </div>`).join('');
    }
  }

  function shiftDay(delta) {
    const d = new Date(currentDate + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    currentDate = d.toISOString().slice(0,10);
    render();
  }

  document.getElementById('prev-day').onclick = () => shiftDay(-1);
  document.getElementById('next-day').onclick = () => shiftDay(1);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  load();
  render();
</script>
</body>
</html>
